<div class="auth-card">
  <h2 class="auth-title">Login</h2>
  <form autocomplete="off">
    <div class="mb-4 row align-items-center">
      <label for="email" class="col-4 col-form-label form-label">Email Address</label>
      <div class="col-8">
        <input type="email" class="form-control" id="email" required />
      </div>
    </div>
    <div class="mb-4 row align-items-center">
      <label for="password" class="col-4 col-form-label form-label">Password</label>
      <div class="col-8">
        <input type="password" class="form-control" id="password" required />
      </div>
    </div>
    <div class="mb-4 row align-items-center">
      <div class="col-4 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMeLogin" />
        <label class="form-check-label" for="rememberMeLogin">Remember Me</label>
      </div>
      <div class="col-8 text-end">
        <a href="#" (click)="renderForgot(); $event.preventDefault();">Forgot Password?</a>
      </div>
    </div>
    <div class="d-flex align-items-center mt-4">
      <button type="submit" class="btn btn-primary me-3">Login</button>
      <div class="auth-links">
        <a href="#" (click)="renderRegister(); $event.preventDefault();">Register</a>
      </div>
    </div>
  </form>
</div>
