<div class="auth-card">
  <h2 class="auth-title">Forgot Password</h2>
  <form autocomplete="off">
    <div class="mb-4 row align-items-center">
      <label for="email" class="col-4 col-form-label form-label">Email Address</label>
      <div class="col-8">
        <input type="email" class="form-control" id="email" required />
      </div>
    </div>
    <div class="d-flex align-items-center mt-4">
      <button type="submit" class="btn btn-primary me-3">Send Reset Link</button>
      <div class="auth-links">
        <a href="#" (click)="renderLogin(); $event.preventDefault();">Back to Login</a>
      </div>
    </div>
  </form>
</div>
