<div class="auth-card">
  <h2 class="auth-title">Register</h2>
  <form autocomplete="off">
    <div class="mb-4 row align-items-center">
      <label for="username" class="col-5 col-form-label form-label">Username</label>
      <div class="col-7">
        <input type="text" class="form-control" id="username" required />
      </div>
    </div>
    <div class="mb-4 row align-items-center">
      <label for="email" class="col-5 col-form-label form-label">Email Address</label>
      <div class="col-7">
        <input type="email" class="form-control" id="email" required />
      </div>
    </div>
    <div class="mb-4 row align-items-center">
      <label for="password" class="col-5 col-form-label form-label">Password</label>
      <div class="col-7">
        <input type="password" class="form-control" id="password" required />
      </div>
    </div>
    <div class="mb-4 row align-items-center">
      <label for="confirmPassword" class="col-5 col-form-label form-label">Confirm Password</label>
      <div class="col-7">
        <input type="password" class="form-control" id="confirmPassword" required />
      </div>
    </div>
    <div class="d-flex align-items-center mt-4">
      <button type="submit" class="btn btn-primary me-3">Register</button>
      <div class="auth-links">
        <a href="#" (click)="renderLogin(); $event.preventDefault();">Have an account?</a>
      </div>
    </div>
  </form>
</div>
